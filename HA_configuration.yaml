# Home Assistant configuration.yaml snippet
# Adds a Fan entity that maps percentage speeds to the ESPHome Orcon switches.
#
# Add this under "fan:" in your configuration.yaml, or include it via:
#   fan: !include HA_configuration.yaml

- platform: template
  fans:
    afzuiging_badkamer:
      friendly_name: "Afzuiging badkamer"
      value_template: >
        {{ "off" if states('sensor.fanspeed') == 'Low' else "on" }}
      percentage_template: >
        {% set speedperc = {'Standby': 0, 'Low': 25, 'Medium': 50, 'High': 75, 'Auto': 100} %}
        {{ speedperc.get(states('sensor.fanspeed'), 0) }}
      turn_on:
        service: switch.turn_on
        target:
          entity_id: switch.fansendhigh
      turn_off:
        service: switch.turn_on
        target:
          entity_id: switch.fansendstandby
      set_percentage:
        service: switch.turn_on
        target:
          entity_id: >
            {% set id_mapp = {0:'switch.fansendstandby', 25:'switch.fansendlow', 50:'switch.fansendmedium', 75:'switch.fansendhigh', 100:'switch.fansendauto'} %}
            {{ id_mapp.get(percentage, 'switch.fansendlow') }}
      speed_count: 4